<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Solecito{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #333;
        }
        .topbar {
            background-color: #FFF7EE;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid #eee;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
        }
        .logo-circle {
            width: 22px;
            height: 22px;
            background-color: #F17E3B;
            border-radius: 50%;
        }
        .grados { display: flex; gap: 8px; }
        .grado-btn {
            padding: 8px 16px;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            background-color: #f5ece1;
            font-size: 14px;
            font-weight: 600;
        }
        .grado-btn.activo { background-color: #F17E3B; color: white; }
        .layout { display: flex; }
        .sidebar {
            width: 220px;
            background-color: #FFF7EE;
            min-height: calc(100vh - 60px);
            padding: 20px;
        }
        .sidebar a {
            display: block;
            padding: 10px 12px;
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .sidebar a.activo { background-color: #F17E3B; color: white; font-weight: 600; }
        .contenido { flex: 1; padding: 30px; }
        h1 { font-size: 22px; margin-bottom: 20px; }
        .tarjeta {
            border: 1px solid #eee;
            border-radius: 18px;
            padding: 18px 20px;
            margin-bottom: 16px;
        }
        .tarjeta-top { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
        .clave {
            font-size: 12px;
            background-color: #f5ece1;
            padding: 3px 10px;
            border-radius: 10px;
            color: #666;
        }
        .urgente { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
        .urgente.rojo { background-color: #fde2e2; color: #c0392b; }
        .urgente.amarillo { background-color: #fdf3d0; color: #a67c00; }
        .urgente.verde { background-color: #e0f5e4; color: #2e7d32; }
        .tarea-nombre { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .tarea-meta { font-size: 13px; color: #777; }
        .vacio { color: #999; font-size: 14px; }

        .contenedor { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .volver {
            display: inline-block;
            margin-bottom: 20px;
            color: #F17E3B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .tarjeta-detalle { border: 1px solid #eee; border-radius: 20px; padding: 28px; }
        .meta { font-size: 14px; color: #777; margin-bottom: 20px; }
        .descripcion {
            font-size: 15px;
            line-height: 1.6;
            background-color: #FAFAFA;
            padding: 18px;
            border-radius: 14px;
        }
        .enterado { margin-top: 24px; padding: 18px; background-color: #FFF7EE; border-radius: 14px; }
        .enterado label { font-size: 14px; font-weight: 600; }

        .subtitulo { font-size: 14px; color: #777; margin-bottom: 24px; }
        .campo { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-family: inherit;
            font-size: 14px;
            background-color: white;
        }
        textarea { resize: vertical; min-height: 100px; }
        button {
            background-color: #F17E3B;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .exito { background-color: #e0f5e4; color: #2e7d32; padding: 16px; border-radius: 14px; font-size: 14px; }
        .error { background-color: #fde2e2; color: #c0392b; padding: 16px; border-radius: 14px; font-size: 14px; margin-bottom: 16px; }
        .acciones { display: flex; gap: 8px; margin-top: 10px; }
        .btn-mini { display: inline-block; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font-family: inherit; }
        .btn-editar { background-color: #f5ece1; color: #333; }
        .btn-eliminar { background-color: #fde2e2; color: #c0392b; }
        .btn-nueva { display: inline-block; background-color: #F17E3B; color: white; padding: 10px 18px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px; margin-bottom: 20px; }
        .pregunta-blog { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
        .respuesta-blog { background-color: #FFF7EE; padding: 14px; border-radius: 12px; font-size: 14px; margin-top: 8px; }
        .info-bloque { line-height: 1.7; margin-bottom: 16px; }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo">
            <div class="logo-circle"></div>
            SOLECITO
        </div>
        {% block topbar_extra %}{% endblock %}
    </div>

    {% block contenido %}{% endblock %}

</body>
</html>
