{% extends 'tareas/base.html' %}

{% block titulo %}Login Docente - Solecito{% endblock %}

{% block contenido %}
    <div class="contenedor">
        <a href="{% url 'inicio' %}" class="volver">&larr; Volver al portal de tareas</a>

        <h1>Login Docente</h1>
        <p class="subtitulo">Acceso exclusivo para profesores del plantel.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="campo">
                <label>Usuario</label>
                <input type="text" name="usuario" required>
            </div>
            <div class="campo">
                <label>Contraseña</label>
                <input type="password" name="contrasena" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </div>
{% endblock %}
